{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header" style="background: var(--accent-gradient); border: none;">
                    <h3 class="text-white text-center mb-0">🎯 CONTROLE DE PRESTES</h3>
                    <h5 class="text-white text-center">Sistema de Gestão de Estoque</h5>
                </div>
                <div class="card-body">
                    <h5 class="card-title text-center mb-4">Selecione seu setor de trabalho</h5>
                    
                    <div class="list-group mb-3" id="setores-lista">
                        {% for setor in setores %}
                        <a href="#" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
                           onclick="acessarSetor('{{ setor }}')">
                            {{ setor }}
                            <span class="badge" id="icone-{{ setor|replace(' ', '_') }}" style="background: var(--accent-gradient);">🔓</span>
                        </a>
                        {% endfor %}
                    </div>
                    
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="novo-setor" placeholder="Novo setor">
                        <button class="btn btn-success" type="button" onclick="criarSetor()">Criar</button>
                    </div>
                    
                    <div class="text-center text-muted small">
                        <i class="bi bi-shield-lock"></i> Setores com cadeado 🔒 são protegidos por senha
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.list-group-item {
    transition: all 0.3s ease;
}
.list-group-item:hover {
    transform: translateX(5px);
    border-color: var(--accent-glow);
}
.badge {
    font-size: 1rem;
    padding: 0.5rem 0.8rem;
}
</style>

<script>
function acessarSetor(setor) {
    // Verifica se o setor precisa de senha
    fetch('/api/verificar-necessidade-senha/' + encodeURIComponent(setor))
        .then(response => response.json())
        .then(data => {
            if (data.precisa_senha) {
                // Precisa de senha - vai para página de login
                window.location.href = '/login-setor/' + encodeURIComponent(setor);
            } else {
                // Não precisa de senha - vai direto
                window.location.href = '/setor/' + encodeURIComponent(setor);
            }
        })
        .catch(error => {
            console.error(error);
            // Em caso de erro, vai direto (compatibilidade)
            window.location.href = '/setor/' + encodeURIComponent(setor);
        });
}

function criarSetor() {
    const setor = document.getElementById('novo-setor').value.trim().toUpperCase();
    if (!setor) {
        alert('Digite um nome para o setor');
        return;
    }
    
    fetch('/api/setores/novo', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({setor: setor})
    })
    .then(response => response.json())
    .then(data => {
        if (data.sucesso) {
            // Após criar, vai direto para o setor (novo setor não tem senha)
            window.location.href = '/setor/' + encodeURIComponent(data.setor);
        } else {
            alert(data.erro || 'Erro ao criar setor');
        }
    })
    .catch(error => {
        alert('Erro ao conectar com o servidor');
        console.error(error);
    });
}

// Verificar ícones de cadeado para setores com senha
document.addEventListener('DOMContentLoaded', function() {
    {% for setor in setores %}
    (function(setor) {
        const iconeId = 'icone-' + setor.replace(/ /g, '_');
        fetch('/api/verificar-necessidade-senha/' + encodeURIComponent(setor))
            .then(response => response.json())
            .then(data => {
                const icone = document.getElementById(iconeId);
                if (icone) {
                    if (data.precisa_senha) {
                        icone.innerHTML = '🔒';
                        icone.style.background = 'var(--accent-gradient)';
                    } else {
                        icone.innerHTML = '🔓';
                        icone.style.background = 'var(--accent-gradient)';
                    }
                }
            })
            .catch(error => console.error('Erro ao verificar senha para', setor, error));
    })("{{ setor }}");
    {% endfor %}
});
</script>
{% endblock %}
