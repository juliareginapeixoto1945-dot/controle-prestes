{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-success text-white">
            <h5>➕ Adicionar Quantidade</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">EAN do Produto:</label>
                        <input type="text" class="form-control" id="ean-qtd" placeholder="Digite ou bipe o EAN">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Mês:</label>
                        <select class="form-control" id="mes-qtd">
                            {% for i in range(1,13) %}
                            <option value="{{ '%02d' % i }}">{{ '%02d' % i }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Ano:</label>
                        <select class="form-control" id="ano-qtd">
                            {% for ano in range(2026,2033) %}
                            <option>{{ ano }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Quantidade:</label>
                        <input type="number" class="form-control" id="quantidade" value="1" min="1">
                    </div>
                    
                    <button class="btn btn-success" onclick="adicionarQuantidade()">Adicionar</button>
                </div>
                
                <div class="col-md-6">
                    <div class="alert alert-info" id="info-produto" style="display: none;"></div>
                </div>
            </div>
            
            <div id="resultado-qtd" class="mt-4"></div>
        </div>
    </div>
</div>

<script>
document.getElementById('ean-qtd').addEventListener('blur', function() {
    const ean = this.value.trim();
    if (ean.length >= 13) {
        buscarProdutoInfo(ean);
    }
});

function buscarProdutoInfo(ean) {
    fetch('/api/produtos/buscar/' + ean)
        .then(response => response.json())
        .then(data => {
            const infoDiv = document.getElementById('info-produto');
            if (data.encontrado) {
                infoDiv.innerHTML = `<strong>Produto:</strong> ${data.descricao}`;
                infoDiv.style.display = 'block';
                infoDiv.className = 'alert alert-success';
            } else {
                infoDiv.innerHTML = '❌ Produto não encontrado. Cadastre primeiro.';
                infoDiv.style.display = 'block';
                infoDiv.className = 'alert alert-danger';
            }
        });
}

function adicionarQuantidade() {
    const ean = document.getElementById('ean-qtd').value.trim();
    const mes = document.getElementById('mes-qtd').value;
    const ano = document.getElementById('ano-qtd').value;
    const qtd = document.getElementById('quantidade').value;
    
    if (!ean) {
        alert('Digite o EAN');
        return;
    }
    
    fetch('/api/produtos/adicionar-quantidade', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ean, mes, ano, quantidade: qtd})
    })
    .then(response => response.json())
    .then(data => {
        if (data.sucesso) {
            document.getElementById('resultado-qtd').innerHTML = 
                `<div class="alert alert-success">✅ ${data.mensagem}</div>`;
            document.getElementById('info-produto').style.display = 'none';
        } else {
            document.getElementById('resultado-qtd').innerHTML = 
                `<div class="alert alert-danger">❌ ${data.erro}</div>`;
        }
    });
}
</script>
{% endblock %}
